name: CI

# Fast PR gate: run the full pytest suite on every PR and every push to main.
# Lint (Ruff) and security (Bandit, pip-audit) are deliberately out of scope
# for v1.1.0 — the codebase has not been linted in CI before and a strict
# day-one gate would block PRs on incidental drift rather than catching new
# bugs. Add a separate workflow once the team agrees on the lint baseline.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run test suite
        env:
          PYTHONPATH: .
        run: pytest tests/ -q
