name: CI

# Fast PR gate: lint, security, and tests. All three must pass before a PR
# can be merged (enforce via branch protection once the repo's lint baseline
# settles — see pyproject.toml for the v1.1.0 minimal-ruleset starting point).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format --check)
        run: ruff format --check .

  security:
    name: Security (Bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Bandit and pip-audit
        run: pip install bandit pip-audit

      - name: Bandit (AST security scan)
        run: bandit -c pyproject.toml -r scripts hooks internal

      - name: pip-audit (dependency CVE scan)
        run: pip-audit -r requirements.txt

  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock

      - name: Run test suite
        env:
          PYTHONPATH: .
          # Propagates to subprocess pytest runs too (e.g. self_improve's
          # run_tests_in_clone) so the broken libtmux plugin is disabled
          # everywhere, not just the outer run.
          PYTEST_ADDOPTS: "-p no:libtmux"
        run: pytest tests/ -q
