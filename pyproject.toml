# Atelier has no Python package metadata (it ships as a Claude Code plugin,
# not a pip-installable distribution). This file exists solely to host shared
# tool configuration so local runs and CI agree on the rule set.
#
#   Local:  ruff check --fix . && ruff format .
#           bandit -c pyproject.toml -r scripts hooks internal
#           pip-audit -r requirements.txt
#           pytest tests/
#   CI:     .github/workflows/ci.yml runs the same.
#
# Ruleset starts minimal for v1.1.0 (the codebase has never been linted in CI
# before; a strict day-one gate would block PRs on incidental drift). Tighten
# `select` over time as the team agrees on additional categories.

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    ".git",
    "__pycache__",
    ".claude/worktrees",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
]
ignore = [
    "E501",   # line-too-long — formatter handles wraps it can; long strings get a pass
    "E402",   # module-level-import-not-at-top — Atelier scripts route some imports through
              #   _memex_module() context managers; the late imports are intentional.
    "E731",   # lambda-assignment — test fixtures use this idiom liberally
    "F401",   # unused-import — re-exports are common at __init__ boundaries
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "E741",   # ambiguous variable name — tests reuse `l`, `I`, etc. for brevity
]

[tool.bandit]
exclude_dirs = ["tests", ".github", "__pycache__", ".claude"]
# Atelier shells out to `git` (worktree, session_open hook) and reads/writes
# SQLite. The subprocess findings below are intentional and uniform across
# the codebase; blanket-skipping is cleaner than scattering nosec comments.
skips = [
    "B101",   # assert_used — invariant assertions in production code are intentional
    "B404",   # blacklist-import-subprocess — Atelier shells to git by design
    "B603",   # subprocess-without-shell-equals-true — this IS the safe form (no shell)
    "B607",   # start-process-with-partial-path — `git` resolves via PATH; intended
    "B608",   # hardcoded-sql-expressions — Atelier builds SQL like
              #   `f"INSERT INTO {table}..."` where `table` is an internal hardcoded
              #   identifier validated against a fixed set (see scripts/backend_memex.py
              #   safe_identifier checks). User-supplied values are always parameterized.
]
