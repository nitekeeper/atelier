name: Notify agora

# Tag-triggered: push `v<X.Y.Z>` and this workflow runs tests as a final
# gate, then sends a `plugin-released` repository_dispatch event to agora
# (nitekeeper/agora) so its plugin-update.yml can bump atelier's pinned
# version in the marketplace.
#
# Authentication: AGORA_DISPATCH_TOKEN must be a PAT with `repo` scope on
# nitekeeper/agora. The default GITHUB_TOKEN cannot dispatch to a different
# repository.
#
# We deliberately do NOT run on `release: published` — when the release is
# created by the default GITHUB_TOKEN, downstream workflow events are
# suppressed by GitHub. Triggering on tag push is the reliable path.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  notify:
    name: Dispatch plugin-released to agora
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run test suite as final gate
        env:
          PYTHONPATH: .
        run: pytest tests/ -q

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify plugin.json version matches the tag
        env:
          # Route tag through env rather than inline-interpolating ${{ ... }}
          # into the run script. Tag push already requires repo write, but
          # env-var passing is defense-in-depth against tag-name injection.
          TAG: ${{ steps.ver.outputs.version }}
        run: |
          python - <<'PY'
          import json, os, sys
          tag = os.environ["TAG"]
          pj = json.load(open(".claude-plugin/plugin.json"))["version"]
          if pj != tag:
              print(f"::error::tag v{tag} does not match .claude-plugin/plugin.json={pj}")
              sys.exit(1)
          print(f"plugin.json agrees with tag: v{tag}")
          PY

      - name: Dispatch plugin-released event to agora
        env:
          GH_TOKEN: ${{ secrets.AGORA_DISPATCH_TOKEN }}
          TAG: ${{ steps.ver.outputs.version }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::AGORA_DISPATCH_TOKEN secret not set. Cannot dispatch to nitekeeper/agora."
            exit 1
          fi
          tag="v${TAG}"
          echo "Dispatching plugin-released to nitekeeper/agora (plugin=atelier, tag=$tag)"
          gh api repos/nitekeeper/agora/dispatches \
            -f event_type=plugin-released \
            -f client_payload[plugin]="atelier" \
            -f client_payload[tag]="$tag"
